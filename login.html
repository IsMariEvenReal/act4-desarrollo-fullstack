<!DOCTYPE html>
<html lang="es">
<head>
    <title>Inicio de sesión Lavanda</title>
    <meta name="description" content="Página para iniciar sesión como usuario de Ediciones Lavanda">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <script src="login.js" defer></script>
    <script src="https://accounts.google.com/gsi/client" defer></script>
</head>
<body id="user">
    <h1>Inicio de sesión Lavanda</h1>
    <p>Si no tienes una cuenta todavía, <a href="registro.html">regístrate</a></p>
    <form id="form-login">
        <br>
        <label for="Email">Correo electrónico: </label>
        <input type="email" id="Email" name="Email" required>
        <br>
        <label for="Pass">Contraseña:</label>
        <input type="password" id="Pass" name="Pass" required></input>
        <br>
        <input type="submit" value="Iniciar sesión">
    </form>
    <br>
    <div id="g_id_onload"
        data-client_id="605750387077-bdif5mblfjdii3sogiqr5iscpt0gt9q2.apps.googleusercontent.com"
        data-context="signin"
        data-ux_mode="popup"
        data-callback="handleCredentialResponse"
        data-auto_prompt="false">
    </div>
    <div class="contenedor-google">
        <div class="g_id_signin"
            data-type="standard"
            data-shape="rectangular"
            data-theme="outline"
            data-text="signin_with"
            data-size="large"
            data-logo_alignment="center"
            data-width="250">
        </div>
    </div>
    <br>
    <a href="index.html">Volver a la página principal</a>
</body>
